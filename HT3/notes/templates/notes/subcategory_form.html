{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h1>
    <form method="post" class="bg-white rounded-xl shadow p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
            {{ form.category }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Название</label>
            {{ form.name }}
        </div>
        <div class="flex gap-3 pt-4">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition">Сохранить</button>
            <a href="{% url 'note_list' %}" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
