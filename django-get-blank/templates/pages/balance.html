<header class="bg-white shadow">
    <div class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8 flex flex-1 flex-wrap place-content-between">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900">
            Ваш баланс: <span class="font-normal">{{ user.balance }} руб</span>
        </h1>
    </div>
</header>

<div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8 main-content">
    <div class="flex items-center justify-center py-32">
        <div class="px-8 py-6 mx-4 mt-4 text-left bg-white shadow-lg md:w-1/3 lg:w-1/3 sm:w-1/3">
            <h3 class="text-2xl font-bold text-center">Пополнить Баланс</h3>
            <form action="{% url 'payment:create' %}" method="post">
                {% csrf_token %}
                <div class="mt-4">
                    <div>
                        <label class="block" for="payment">Сумма пополнения:</label>
                        <input type="text" placeholder="Введите сумму пополнения" name="payment" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                    </div>
                    <div class="flex">
                        <button type="submit" class="w-full px-6 py-2 mt-4 text-white bg-blue-600 rounded-lg hover:bg-blue-900">Пополнить</button>
                    </div>
                    <div class="mt-6 font-s text-grey-dark text-xs">Оплата производится через платежный сервис Юкасса (бывшие Яндекс Деньги)</div>
                </div>
            </form>
        </div>
    </div>
</div>
