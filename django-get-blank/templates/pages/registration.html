<div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8 main-content">
    <div class="flex items-center justify-center py-32 bg-gray-100">
        <div class="px-8 py-6 mx-4 mt-4 text-left bg-white shadow-lg md:w-1/3 lg:w-1/3 sm:w-1/3">
            <div class="flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-center">Регистрация</h3>
            <form action="{% url 'registration' %}" method="post" onsubmit="return checkRegForm()">
                {% csrf_token %}
                <div class="mt-4">
                    <div>
                        <label class="block" for="login">Логин</label>
                        <input type="text" placeholder="Логин" name="login" id="login" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                        <span style="font-size: 12px; color: red; display: none;" id="login_taken">Пользователь с таким логином уже зарегистрирован</span>
                        <span style="font-size: 12px; color: red; display: none;" id="login_too_short">Логин должен быть не менее 3 символов</span>
                    </div>
                    <div class="mt-4">
                        <label class="block" for="email">Email</label>
                        <input type="text" placeholder="Email" name="email" id="email" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                        <span style="font-size: 12px; color: red; display: none;" id="email_taken">Пользователь с такой почтой уже зарегистрирован</span>
                        <span style="font-size: 12px; color: red; display: none;" id="email_too_short">Пожалуйста, укажите почту</span>
                    </div>
                    <div class="mt-4">
                        <label class="block" for="psw">Пароль</label>
                        <input type="password" placeholder="Пароль" name="password" id="psw" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                        <span style="font-size: 12px; color: red; display: none;" id="psw_too_short">Пароль должен быть не менее 4 символов</span>
                    </div>
                    <div class="mt-4">
                        <label class="block" for="psw_repeat">Подтвердите пароль</label>
                        <input type="password" placeholder="Пароль" id="psw_repeat" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                        <span class="text-xs text-red-400 hidden" id="psw_not_match">Пароли не совпадают!</span>
                    </div>
                    <div class="mt-4">
                        <label class="block" for="promocode">Промокод (если есть)</label>
                        <input type="text" placeholder="Промокод" id="promocode" name="promocode" value="{{ promocode }}" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                    </div>
                    <div class="flex">
                        <button class="w-full px-6 py-2 mt-4 text-white bg-blue-600 rounded-lg hover:bg-blue-900">Создать аккаунт</button>
                    </div>
                    <div class="mt-6 text-grey-dark">
                        Уже зарегистрированы?
                        <a class="text-blue-600 hover:underline" href="{% url 'login' %}">Войти</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function checkRegForm(){
        let login = document.getElementById('login').value
        let psw = document.getElementById('psw').value
        let email = document.getElementById('email').value
        let pswRepeat = document.getElementById('psw_repeat').value

        if(psw != pswRepeat) {
            document.getElementById('psw_not_match').style.display = "block"
            return false
        }

        if(psw.length < 3) {
            document.getElementById('psw_too_short').style.display = "block"
            return false
        }

        if(login.length < 3) {
            document.getElementById('login_too_short').style.display = "block"
            return false
        }

        if(email.length < 3) {
            document.getElementById('email_too_short').style.display = "block"
            return false
        }

        if(document.getElementById('login_taken').style.display == "inline") {
            return false
        }

        return true
    }

    document.getElementById('login').addEventListener('keyup', () => {
        document.getElementById('login_too_short').style.display = 'none'
    })

    document.getElementById('login').addEventListener('keyup', () => {
        document.getElementById('login_taken').style.display = 'none'
    })

    document.getElementById('email').addEventListener('keyup', () => {
        document.getElementById('email_taken').style.display = 'none'
    })

    document.getElementById('email').addEventListener('keyup', () => {
        document.getElementById('email_too_short').style.display = 'none'
    })

    document.getElementById('psw').addEventListener('keyup', () => {
        document.getElementById('psw_too_short').style.display = 'none'
    })

    document.getElementById('psw_repeat').addEventListener('keyup', () => {
        document.getElementById('psw_not_match').style.display = 'none'
    })

    document.getElementById('login').addEventListener('change', () => {
        let login = document.getElementById('login').value

        fetch('{% url "check_login" %}', {
            method: "POST",
            headers: {"Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}"},
            body: JSON.stringify({login: login})
        })
        .then(response => response.json())
        .then(data => {
            if(data['count'] > 0){
                document.getElementById('login_taken').style.display = 'inline'
            }else{
                document.getElementById('login_taken').style.display = 'none'
            }
        })
        .catch(error => console.error("Ошибка:", error))
    })

    document.getElementById('email').addEventListener('change', () => {
        let email = document.getElementById('email').value

        fetch('{% url "check_email" %}', {
            method: "POST",
            headers: {"Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}"},
            body: JSON.stringify({email: email})
        })
        .then(response => response.json())
        .then(data => {
            if(data['count'] > 0){
                document.getElementById('email_taken').style.display = 'inline'
            }else{
                document.getElementById('email_taken').style.display = 'none'
            }
        })
        .catch(error => console.error("Ошибка:", error))
    })
</script>
