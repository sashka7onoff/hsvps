<div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8 main-content">
    <div class="flex items-center justify-center py-32 bg-gray-100">
        <div class="px-8 py-6 mx-4 mt-4 text-left bg-white shadow-lg md:w-1/3 lg:w-1/3 sm:w-1/3">
            <div class="flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="height: 56px;">
                    <path d="M352 96l64 0c17.7 0 32 14.3 32 32l0 256c0 17.7-14.3 32-32 32l-64 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l64 0c53 0 96-43 96-96l0-256c0-53-43-96-96-96l-64 0c-17.7 0-32 14.3-32 32s14.3 32 32 32zm-9.4 182.6c12.5-12.5 12.5-32.8 0-45.3l-128-128c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L242.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l210.7 0-73.4 73.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l128-128z" style="filter: invert(28%) sepia(49%) saturate(3646%) hue-rotate(215deg) brightness(93%) contrast(92%);"></path>
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-center my-2">Авторизация</h3>
            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="mt-4">
                    <div>
                        <label class="block" for="login_input">Логин</label>
                        <input type="text" placeholder="Логин" name="login" id="login_input" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                    </div>
                    <div class="mt-4">
                        <label class="block" for="password_input">Пароль</label>
                        <input type="password" placeholder="Пароль" name="password" id="password_input" class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-blue-600">
                    </div>
                    <div class="mt-4">
                        <label class="block" style="color: red; display: {% if login_error %}inline{% else %}none{% endif %};">Неверный логин или пароль</label>
                    </div>
                    <div class="flex">
                        <button type="submit" class="w-full px-6 py-2 mt-4 text-white bg-blue-600 rounded-lg hover:bg-blue-900">Войти</button>
                    </div>
                    <div class="mt-6 text-grey-dark">
                        Нет аккаунта?
                        <a class="text-blue-600 hover:underline" href="{% url 'registration' %}">Регистрация</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
