events {}

http {

    include /etc/nginx/mime.types;

    upstream django {
        server web:8000;
    }

    upstream django2 {
        server web2:8000;
    }

    server {
        listen 80;
        server_name habits-app.ru www.habits-app.ru;

        location /static/ {
            alias /app/staticfiles/;
        }

        location / {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name habits-app.ru www.habits-app.ru;

        ssl_certificate /etc/letsencrypt/live/habits-app.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/habits-app.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /static/ {
            alias /app/staticfiles/;
        }

        location / {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name get-blank.ru www.get-blank.ru;

        location /static/ {
            alias /app2/staticfiles/;
        }

        location / {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name get-blank.ru www.get-blank.ru;

        ssl_certificate /etc/letsencrypt/live/get-blank.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/get-blank.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /static/ {
            alias /app2/staticfiles/;
        }

        location / {
            proxy_pass http://django2;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }


    server {
        listen 80;
        server_name alex-crm.ru www.alex-crm.ru;

        root /var/www/html/;
        index index.html index.nginx-debian.html;
    }

    server {
        listen 443 ssl;
        server_name alex-crm.ru www.alex-crm.ru;

        ssl_certificate /etc/letsencrypt/live/alex-crm.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/galex-crm.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /var/www/html/;
        index index.html index.nginx-debian.html;
    }


}
