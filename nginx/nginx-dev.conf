events {}

http {

    include /etc/nginx/mime.types;

    upstream django {
        server web:8000;
    }

    upstream django2 {
        server web2:8000;
    }

    server {
        listen 80;
        server_name habits-app.ru.local www.habits-app.ru.local;

        location /static/ {
            alias /app/staticfiles/;
        }

        location / {
            proxy_pass http://django;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {

        include /etc/nginx/mime.types;

        listen 80;
        server_name get-blank.ru www.get-blank.ru get-blank.ru.local;
        client_max_body_size 50M;

        location /static/ {
            alias /app2/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app2/media/;
            expires 30d;
        }

        location / {
            proxy_pass http://django2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

