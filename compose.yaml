services:

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - pg_data:/var/lib/postgresql/data

  db2:
    image: postgres:16

    environment:
      POSTGRES_DB: ${DB_NAME2}
      POSTGRES_USER: ${DB_USER2}
      POSTGRES_PASSWORD: ${DB_PASSWORD2}

    volumes:
      - pg_data2:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER2} -d ${DB_NAME2}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./HT3

    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"

    volumes:
      - static_volume:/app/staticfiles
      - ./HT3:/app
#    ports:
#      - 8000:8000
    depends_on:
      - db

  web2:
    build: ./django-get-blank
    restart: unless-stopped
    env_file: django-get-blank/.env
    depends_on:
      db2:
        condition: service_healthy
    volumes:
      - static_volume2:/app/staticfiles
      - media_volume2:/app/media
      - ./django-get-blank:/app
#    ports:
#      - "8001:8000"

  nginx:
    image: nginx:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - static_volume:/app/staticfiles
      - static_volume2:/app2/staticfiles
      - media_volume2:/app2/media
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - web2

volumes:
  pg_data:
  pg_data2:
  static_volume:
  static_volume2:
  media_volume2:
